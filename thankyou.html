<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Seen by Matt</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #090909;
      --gold: #c9a55a;
      --gold-dk: #8f6e2e;
      --white: #f5f2ed;
      --muted: #888880;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Montserrat', sans-serif;
    }
    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }
    .check {
      font-size: 4rem;
      color: var(--gold);
      margin-bottom: 24px;
      animation: pop 0.5s ease;
    }
    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .logo {
      font-family: var(--serif);
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 48px;
    }
    h1 {
      font-family: var(--serif);
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 24px;
    }
    h1 em { font-style: italic; color: var(--gold); }
    p {
      font-family: var(--serif);
      font-size: 1.15rem;
      color: rgba(245,242,237,0.7);
      line-height: 1.8;
      max-width: 480px;
      margin: 0 auto 48px;
    }
    .btn {
      display: inline-block;
      background: var(--gold);
      color: var(--black);
      font-family: var(--sans);
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 16px 40px;
      text-decoration: none;
      transition: background 0.25s;
    }
    .btn:hover { background: #e2c47e; }
    .divider {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--gold-dk), transparent);
      margin: 0 auto 48px;
    }
    .social {
      margin-top: 32px;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .social a { color: var(--gold); text-decoration: none; }
    .social a:hover { color: #e2c47e; }
  </style>
</head>
<body>
  <div class="logo">Seen by Matt</div>
  <div class="check">✓</div>
  <h1>You're all <em>set!</em></h1>
  <p>Thanks for reaching out. I'll get back to you within 24 hours to talk through everything and get your session locked in.</p>
  <div class="divider"></div>
  <a class="btn" href="https://seenbymatt.com">Back to Homepage</a>
  <div class="social">
    <p style="margin-top:32px;">Follow along on Instagram<br /><a href="https://instagram.com/seenbymatt_" target="_blank">@seenbymatt_</a></p>
  </div>
</body>
</html>
